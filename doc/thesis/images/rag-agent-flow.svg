<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#253a63"/>
    </marker>
    <style>
      .node { fill: #f8fbff; stroke: #253a63; stroke-width: 2; rx: 14; }
      .decision { fill: #fff6e8; stroke: #a86612; stroke-width: 2; rx: 14; }
      .evidence { fill: #eef8ff; stroke: #1f5eff; stroke-width: 2; rx: 14; }
      .answer { fill: #f0fff7; stroke: #1a7d55; stroke-width: 2; rx: 14; }
      .title { font: 700 25px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #17233f; }
      .text { font: 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #17233f; }
      .small { font: 15px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #40516f; }
      .arrow { stroke: #253a63; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="560" y="38" text-anchor="middle" class="title">RAG 与 Agent 协同问答流程</text>

  <rect x="38" y="92" width="150" height="92" class="node"/>
  <text x="113" y="130" text-anchor="middle" class="text">用户问题</text>
  <text x="113" y="158" text-anchor="middle" class="small">session_id</text>

  <rect x="238" y="92" width="170" height="92" class="decision"/>
  <text x="323" y="130" text-anchor="middle" class="text">路由规划</text>
  <text x="323" y="158" text-anchor="middle" class="small">GLM 判断工具</text>

  <rect x="458" y="40" width="170" height="82" class="node"/>
  <text x="543" y="74" text-anchor="middle" class="text">本地检索</text>
  <text x="543" y="100" text-anchor="middle" class="small">向量 + 关键词备用召回</text>

  <rect x="458" y="154" width="170" height="82" class="node"/>
  <text x="543" y="188" text-anchor="middle" class="text">记忆读取</text>
  <text x="543" y="214" text-anchor="middle" class="small">摘要与偏好</text>

  <rect x="458" y="268" width="170" height="82" class="node"/>
  <text x="543" y="302" text-anchor="middle" class="text">联网搜索</text>
  <text x="543" y="328" text-anchor="middle" class="small">可选 Tavily</text>

  <rect x="690" y="92" width="170" height="92" class="evidence"/>
  <text x="775" y="130" text-anchor="middle" class="text">证据包组织</text>
  <text x="775" y="158" text-anchor="middle" class="small">引用与工具轨迹</text>

  <rect x="920" y="92" width="160" height="92" class="answer"/>
  <text x="1000" y="130" text-anchor="middle" class="text">答案生成</text>
  <text x="1000" y="158" text-anchor="middle" class="small">Qwen 输出引用</text>

  <rect x="690" y="264" width="390" height="74" class="answer"/>
  <text x="885" y="294" text-anchor="middle" class="text">返回前端</text>
  <text x="885" y="320" text-anchor="middle" class="small">answer / citations / tool_trace / memory 状态</text>

  <path d="M188 138 H238" class="arrow"/>
  <path d="M408 138 C430 138, 430 81, 458 81" class="arrow"/>
  <path d="M408 138 H458" class="arrow"/>
  <path d="M408 138 C430 138, 430 309, 458 309" class="arrow"/>
  <path d="M628 81 C660 81, 660 138, 690 138" class="arrow"/>
  <path d="M628 195 C660 195, 660 138, 690 138" class="arrow"/>
  <path d="M628 309 C660 309, 660 138, 690 138" class="arrow"/>
  <path d="M860 138 H920" class="arrow"/>
  <path d="M1000 184 V264" class="arrow"/>
</svg>
