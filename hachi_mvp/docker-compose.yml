services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: hachi-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - ./docker_data/etcd:/etcd
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: hachi-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
      - "${MINIO_API_PORT:-19000}:9000"
    volumes:
      - ./docker_data/minio:/minio_data
    restart: unless-stopped

  milvus-standalone:
    image: milvusdb/milvus:v2.5.5
    container_name: hachi-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - ./docker_data/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - milvus-standalone
    ports:
      - "8008:8008"
    environment:
      - HACHI_HOST=0.0.0.0
      - HACHI_PORT=8008
      - SQLITE_PATH=/app/data/hachi_mvp.db
      - MILVUS_MODE=${MILVUS_MODE:-remote}
      - MILVUS_URI=${MILVUS_URI:-http://milvus-standalone:19530}
      - MILVUS_COLLECTION=hachi_chunks
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-auto}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-10}
      - ROUTER_BASE_URL=${ROUTER_BASE_URL:-}
      - ROUTER_API_KEY=${ROUTER_API_KEY:-}
      - ROUTER_MODEL=${ROUTER_MODEL:-}
      - ANSWER_BASE_URL=${ANSWER_BASE_URL:-}
      - ANSWER_API_KEY=${ANSWER_API_KEY:-}
      - ANSWER_MODEL=${ANSWER_MODEL:-}
      - GLM5_ROUTER_BASE_URL=${GLM5_ROUTER_BASE_URL:-}
      - GLM5_ROUTER_API_KEY=${GLM5_ROUTER_API_KEY:-}
      - GLM5_ROUTER_MODEL=${GLM5_ROUTER_MODEL:-glm-5}
      - QWEN_ANSWER_BASE_URL=${QWEN_ANSWER_BASE_URL:-}
      - QWEN_ANSWER_API_KEY=${QWEN_ANSWER_API_KEY:-}
      - QWEN_ANSWER_MODEL=${QWEN_ANSWER_MODEL:-qwen3.5-plus}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  attu:
    image: zilliz/attu:v2.4
    container_name: hachi-attu
    profiles: ["tools"]
    depends_on:
      - milvus-standalone
    ports:
      - "3001:3000"
    environment:
      - MILVUS_URL=milvus-standalone:19530
    restart: unless-stopped
