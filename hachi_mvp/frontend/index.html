<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hachi 知识助手</title>
  <style>
    :root {
      --bg: #eef1f6;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: #ffffff;
      --line: #d8deea;
      --ink: #1a2238;
      --muted: #5d6987;
      --brand: #1f5eff;
      --brand-soft: #e7eeff;
      --ok: #0f8f61;
      --warn: #b85f00;
      --danger: #c03333;
      --shadow: 0 20px 40px rgba(18, 28, 46, 0.08);
      --r-lg: 18px;
      --r-md: 14px;
      --r-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 500px at 10% -10%, #deebff 0%, transparent 58%),
        radial-gradient(900px 460px at 95% 4%, #dff8f2 0%, transparent 55%),
        var(--bg);
      overflow: hidden;
    }

    .app-shell {
      height: 100vh;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 14px 18px;
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #102042 0%, #1f5eff 100%);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .topbar-note {
      max-width: 360px;
      padding: 9px 12px;
      border: 1px solid #d8e4f8;
      border-radius: 14px;
      background: linear-gradient(180deg, #fbfdff 0%, #f1f6ff 100%);
      color: #476083;
      font-size: 12px;
      line-height: 1.45;
      text-align: right;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 320px minmax(420px, 1fr) 320px;
      gap: 14px;
    }

    .panel {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-head {
      padding: 16px 18px 12px;
      border-bottom: 1px solid #e5eaf4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .panel-head small {
      color: var(--muted);
    }

    .panel-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 14px;
    }

    .source-panel-scroll {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .source-panel-scroll > .section:first-child {
      flex: 0 0 auto;
    }

    .source-library-section {
      flex: 1 1 auto;
      min-height: 180px;
      margin-bottom: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .section {
      background: var(--panel-strong);
      border: 1px solid #e3e8f1;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
      animation: fade-up 220ms ease both;
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }

    .tab {
      border: 1px solid #d9e0ec;
      background: #f4f7fc;
      color: #385074;
      border-radius: 999px;
      padding: 7px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .tab.active {
      color: #fff;
      border-color: #1f5eff;
      background: linear-gradient(135deg, #2a63ff 0%, #1748d4 100%);
    }

    .ingest-pane {
      display: none;
      gap: 8px;
    }

    .ingest-pane.active {
      display: grid;
    }

    label {
      font-size: 12px;
      color: #55637c;
      display: block;
      margin-bottom: 2px;
    }

    input,
    textarea,
    button,
    select {
      font: inherit;
    }

    input[type="text"],
    input[type="url"],
    input[type="datetime-local"],
    textarea {
      width: 100%;
      border: 1px solid #d7deeb;
      background: #fcfdff;
      color: var(--ink);
      border-radius: var(--r-sm);
      padding: 9px 10px;
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    input:focus,
    textarea:focus {
      border-color: #6f90ff;
      box-shadow: 0 0 0 3px #dce6ff;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
      max-height: 220px;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      padding: 8px 13px;
      font-weight: 600;
      transition: transform 120ms ease, filter 120ms ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:disabled {
      cursor: not-allowed;
      filter: grayscale(0.6);
      opacity: 0.6;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1f5eff 0%, #1d49c4 100%);
      color: #fff;
    }

    .btn-soft {
      background: #eef3ff;
      color: #23498b;
      border: 1px solid #d4e0fb;
    }

    .source-filter {
      margin-bottom: 10px;
    }

    .source-list {
      flex: 1 1 auto;
      display: grid;
      gap: 8px;
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
    }

    .source-item {
      border: 1px solid #dde4f1;
      border-radius: 14px;
      padding: 10px;
      background: #f9fbff;
      display: grid;
      gap: 6px;
      transition: transform 120ms ease, border-color 120ms ease;
    }

    .source-item:hover {
      transform: translateY(-1px);
      border-color: #bfd0f8;
    }

    .source-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      word-break: break-word;
    }

    .source-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: #62708d;
      font-size: 11px;
    }

    .source-actions {
      display: flex;
      justify-content: flex-end;
    }

    .source-delete {
      border: 1px solid #f0c7c7;
      background: #fff2f2;
      color: var(--danger);
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11px;
      cursor: pointer;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 99px;
      background: #89a3d1;
      display: inline-block;
      margin-right: 3px;
    }

    .chat-head-right {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      min-width: 260px;
      max-width: 360px;
    }

    .chat-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 16px 14px;
      display: grid;
      gap: 18px;
      align-content: start;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(247, 250, 255, 0.82));
    }

    .msg {
      width: fit-content;
      max-width: min(720px, 82%);
      border-radius: 14px;
      padding: 12px 14px;
      border: 1px solid #e1e8f5;
      line-height: 1.45;
      word-break: break-word;
      animation: fade-up 220ms ease both;
      font-size: 14px;
      text-align: left;
    }

    .msg.user {
      justify-self: end;
      margin-left: auto;
      background: #e9f0ff;
      border-color: #d1def9;
      max-width: min(520px, 62%);
    }

    .msg.assistant {
      justify-self: start;
      margin-right: auto;
      background: #ffffff;
      max-width: min(680px, 76%);
    }

    .msg-meta {
      font-size: 11px;
      color: #60708f;
      margin-top: 5px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      line-height: 1.2;
    }

    .cite-chip {
      border: 1px solid #dce4f3;
      background: #f5f8ff;
      color: #3f557e;
      border-radius: 999px;
      font-size: 11px;
      padding: 3px 8px;
      text-decoration: none;
    }

    .chat-composer {
      border-top: 1px solid #e4e9f2;
      padding: 10px 12px;
      display: grid;
      gap: 8px;
      background: rgba(252, 253, 255, 0.9);
    }

    .chat-composer textarea {
      min-height: 54px;
      max-height: 110px;
      padding: 8px 10px;
      border-radius: 12px;
      line-height: 1.45;
    }

    .composer-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .checks {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: #495978;
      font-size: 12px;
    }

    .checks label {
      margin: 0;
      display: flex;
      gap: 5px;
      align-items: center;
      cursor: pointer;
    }

    #askBtn {
      padding: 7px 14px;
      min-width: 64px;
    }

    .studio-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .studio-card {
      border: 1px solid #dbe3f0;
      border-radius: 14px;
      padding: 12px;
      background: linear-gradient(180deg, #fbfdff 0%, #f5f8ff 100%);
      font-size: 12px;
      color: #4f5f7c;
      text-align: left;
      cursor: pointer;
    }

    .studio-card b {
      display: block;
      color: #1c2a45;
      margin-bottom: 5px;
      font-size: 13px;
    }

    .skill-custom {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .skill-result {
      margin-top: 10px;
      border: 1px solid #dde4f1;
      border-radius: 12px;
      background: #fafcff;
      padding: 10px;
      font-size: 12px;
      color: #44526f;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 320px;
      overflow: auto;
    }

    .skill-artifact {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e2e8f3;
      white-space: normal;
    }

    .skill-artifact a {
      color: #1f5eff;
      font-weight: 700;
      text-decoration: none;
    }

    .skill-preview {
      display: block;
      margin-top: 8px;
      color: inherit;
      text-decoration: none;
    }

    .skill-preview strong {
      color: #1c2a45;
    }

    .trace-list,
    .citation-list,
    .memory-list,
    .reminder-list {
      display: grid;
      gap: 8px;
    }

    .trace-item,
    .citation-item,
    .memory-item,
    .reminder-item {
      border: 1px solid #dde4f1;
      border-radius: 12px;
      background: #fafcff;
      padding: 10px;
      font-size: 12px;
      color: #44526f;
      line-height: 1.45;
    }

    .trace-item b,
    .citation-item b {
      color: #1d2b47;
    }

    .trace-tag {
      display: inline-block;
      border-radius: 999px;
      font-size: 10px;
      padding: 2px 7px;
      margin-left: 6px;
      border: 1px solid #d6deec;
      background: #f1f4fa;
    }

    .trace-ok {
      color: #0f8f61;
      border-color: #b8e7d4;
      background: #e9faf3;
    }

    .trace-skip {
      color: #9a6300;
      border-color: #f2d59b;
      background: #fff6e7;
    }

    details {
      border: 1px solid #e0e6f2;
      border-radius: 12px;
      background: #fff;
      padding: 8px 10px;
    }

    details summary {
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      color: #334262;
    }

    pre {
      margin: 8px 0 0;
      padding: 10px;
      background: #111c30;
      color: #d8e7ff;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.4;
      max-height: 260px;
    }

    .status {
      font-size: 12px;
      color: #40506f;
      border: 1px solid #dce3f0;
      background: #f7f9fe;
      border-radius: 999px;
      padding: 5px 10px;
    }

    .status.ok {
      color: #0d8057;
      border-color: #bfe8d7;
      background: #ebfbf4;
    }

    .status.err {
      color: #b92f2f;
      border-color: #f2c5c5;
      background: #ffefef;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .empty {
      border: 1px dashed #d0d9e8;
      border-radius: 10px;
      padding: 10px;
      color: #5f6f8e;
      font-size: 12px;
      background: #f8fbff;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1220px) {
      body {
        overflow: auto;
      }

      .app-shell {
        height: auto;
        min-height: 100vh;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .topbar-note {
        max-width: none;
        text-align: left;
      }

      .chat-head-right {
        max-width: none;
      }

      .panel {
        min-height: 420px;
      }

      .source-panel-scroll {
        overflow: auto;
      }

      .source-library-section {
        max-height: 420px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">HA</div>
        <div>
          <h1>Hachi 知识助手</h1>
          <p>面向个人知识采集、整理与问答的工作台</p>
        </div>
      </div>
      <div class="topbar-note">
        以知识库为中心，统一处理文本、网页、PDF 与插件采集内容。
      </div>
    </header>

    <main class="workspace">
      <aside class="panel" aria-label="Sources Panel">
        <div class="panel-head">
          <h2>来源</h2>
          <small id="sourceCount">0 个</small>
        </div>
        <div class="panel-scroll source-panel-scroll">
          <section class="section">
            <h3>添加来源</h3>
            <div class="tabs" id="ingestTabs">
              <button class="tab active" data-mode="text">文本</button>
              <button class="tab" data-mode="url">URL</button>
              <button class="tab" data-mode="pdf">PDF</button>
            </div>

            <div class="ingest-pane active" data-pane="text">
              <div>
                <label for="textTitle">标题</label>
                <input id="textTitle" type="text" placeholder="例如：化学词源摘录" value="开题报告摘录" />
              </div>
              <div>
                <label for="textContent">内容</label>
                <textarea id="textContent" placeholder="粘贴知识文本"></textarea>
              </div>
              <button class="btn btn-primary" id="ingestTextBtn">导入文本</button>
            </div>

            <div class="ingest-pane" data-pane="url">
              <div>
                <label for="urlInput">网页地址</label>
                <input id="urlInput" type="url" placeholder="https://..." />
              </div>
              <div>
                <label for="urlTitle">标题（可选）</label>
                <input id="urlTitle" type="text" placeholder="可留空自动提取" />
              </div>
              <button class="btn btn-primary" id="ingestUrlBtn">抓取并导入</button>
            </div>

            <div class="ingest-pane" data-pane="pdf">
              <div>
                <label for="pdfFile">选择 PDF</label>
                <input id="pdfFile" type="file" accept="application/pdf" />
              </div>
              <div>
                <label for="pdfTitle">标题（可选）</label>
                <input id="pdfTitle" type="text" placeholder="可留空使用文件名" />
              </div>
              <button class="btn btn-primary" id="ingestPdfBtn">上传 PDF</button>
            </div>
          </section>

          <section class="section source-library-section">
            <h3>知识库来源</h3>
            <input id="sourceFilter" class="source-filter" type="text" placeholder="搜索来源标题" />
            <div class="source-list" id="sourceList"></div>
          </section>
        </div>
      </aside>

      <section class="panel" aria-label="Chat Panel">
        <div class="panel-head">
          <div>
            <h2>对话</h2>
            <small id="sessionLabel">会话：自动创建</small>
          </div>
          <div class="chat-head-right">
            <label for="sessionIdInput">会话 ID（可留空）</label>
            <input id="sessionIdInput" type="text" placeholder="留空自动创建" />
          </div>
        </div>

        <div class="chat-body" id="chatThread"></div>

        <div class="chat-composer">
          <textarea id="questionInput" placeholder="开始输入你的问题，例如：化学一词在中国最早出现在哪？"></textarea>
          <div class="composer-controls">
            <div class="checks">
              <label><input id="allowWeb" type="checkbox" checked /> 允许联网搜索</label>
              <label><input id="allowMem" type="checkbox" checked /> 允许记忆压缩</label>
            </div>
            <button class="btn btn-primary" id="askBtn">提问</button>
          </div>
        </div>
      </section>

      <aside class="panel" aria-label="Side Panel">
        <div class="panel-head">
          <h2>辅助面板</h2>
          <span class="status" id="statusPill">就绪</span>
        </div>
        <div class="panel-scroll">
          <section class="section">
            <h3>扩展能力</h3>
            <div class="studio-cards">
              <button class="studio-card" type="button" data-skill-id="note_summary"><b>笔记摘要</b>提炼结论、要点、术语和后续问题。</button>
              <button class="studio-card" type="button" data-skill-id="quiz"><b>检测题</b>生成选择题、简答题和参考答案。</button>
              <button class="studio-card" type="button" data-skill-id="flashcards"><b>复习卡片</b>拆成 Anki 风格问答卡片。</button>
              <button class="studio-card" type="button" data-skill-id="action_plan"><b>行动清单</b>整理成可执行任务和风险点。</button>
              <button class="studio-card" type="button" data-skill-id="email_reminder"><b>邮件提醒</b>从邮件记录创建电脑定时提醒。</button>
            </div>
            <div class="skill-custom">
              <label for="reminderAtInput">邮件提醒时间</label>
              <input id="reminderAtInput" type="datetime-local" />
              <label><input id="syncMacCalendar" type="checkbox" checked /> 同步到 macOS 日历</label>
            </div>
            <div class="skill-custom">
              <label for="customSkillInput">自定义 Skill</label>
              <textarea id="customSkillInput" placeholder="例如：把这段内容改成一页面试速查表，按概念、项目追问、回答模板整理。"></textarea>
              <button class="btn btn-soft" id="runCustomSkillBtn" type="button">运行自定义 Skill</button>
            </div>
            <div class="skill-result" id="skillResult">选择一个 Skill，会处理最近一次回答；没有回答时会处理输入框里的内容。</div>
          </section>

          <section class="section">
            <h3>定时提醒</h3>
            <button class="btn btn-soft" id="refreshRemindersBtn" type="button">刷新提醒</button>
            <div class="reminder-list" id="reminderList" style="margin-top:8px;"></div>
          </section>

          <section class="section">
            <h3>最近引用</h3>
            <div class="citation-list" id="citationList"></div>
          </section>

          <section class="section">
            <h3>工具轨迹</h3>
            <div class="trace-list" id="toolTraceList"></div>
          </section>

          <section class="section">
            <h3>会话记忆</h3>
            <div style="display:flex; gap:8px; margin-bottom:8px;">
              <button class="btn btn-soft" id="refreshMemoryBtn">刷新记忆</button>
              <button class="btn btn-soft" id="rebuildMemoryBtn">重整记忆</button>
            </div>
            <div class="memory-list" id="memoryList"></div>
          </section>

          <section class="section">
            <h3>调试输出</h3>
            <details>
              <summary>查看最近一次响应 JSON</summary>
              <pre id="rawOutput">就绪。</pre>
            </details>
          </section>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const state = {
      sessionId: null,
      messages: [],
      sources: [],
      lastResponse: null,
      lastSkillOutput: null,
      sourceFilter: "",
    };

    function $(id) {
      return document.getElementById(id);
    }

    function escapeHtml(input) {
      return String(input || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function withLoading(button, loadingText) {
      const original = button.textContent;
      button.disabled = true;
      button.textContent = loadingText;
      return () => {
        button.disabled = false;
        button.textContent = original;
      };
    }

    function setStatus(text, type = "") {
      const pill = $("statusPill");
      pill.textContent = text;
      pill.className = `status ${type}`.trim();
    }

    async function requestJson(path, options = {}) {
      const response = await fetch(path, options);
      let payload = null;
      try {
        payload = await response.json();
      } catch (_error) {
        payload = null;
      }

      if (!response.ok) {
        const detail = payload && (payload.detail || payload.error || payload.message);
        throw new Error(detail ? String(detail) : `HTTP ${response.status}`);
      }
      return payload;
    }

    function sourceTypeLabel(sourceType) {
      if (sourceType === "pdf") return "PDF";
      if (sourceType === "url") return "网页";
      if (sourceType === "screenshot") return "截图";
      return "文本";
    }

    function renderSources() {
      const list = $("sourceList");
      const keyword = state.sourceFilter.trim().toLowerCase();
      const rows = state.sources.filter((item) => {
        if (!keyword) return true;
        return String(item.title || "").toLowerCase().includes(keyword);
      });

      $("sourceCount").textContent = `${rows.length} 个`;

      if (!rows.length) {
        list.innerHTML = '<div class="empty">暂无来源，可先在上方导入文本、URL 或 PDF。</div>';
        return;
      }

      list.innerHTML = rows
        .map((item) => {
          const created = item.created_at ? new Date(item.created_at).toLocaleString() : "-";
          return `
            <article class="source-item">
              <div class="source-title">${escapeHtml(item.title || "未命名来源")}</div>
              <div class="source-meta">
                <span><span class="dot"></span>${escapeHtml(sourceTypeLabel(item.source_type))}</span>
                <span>片段: ${escapeHtml(String(item.chunks ?? 0))}</span>
                <span>${escapeHtml(created)}</span>
              </div>
              ${item.id ? `<div class="source-actions"><button class="source-delete" type="button" data-delete-doc-id="${escapeHtml(item.id)}">删除</button></div>` : ""}
            </article>
          `;
        })
        .join("");
    }

    function renderChat() {
      const thread = $("chatThread");
      if (!state.messages.length) {
        thread.innerHTML = '<div class="msg assistant">你好，我是 Hachi 知识助手。你可以先在左侧导入资料，再在这里提问。<br>你可以直接提问，系统会结合知识库内容给出带引用的回答。<div class="msg-meta">提示：对时效性问题可开启联网搜索。</div></div>';
        return;
      }

      thread.innerHTML = state.messages
        .map((msg) => {
          const citeHtml = (msg.citations || [])
            .slice(0, 5)
            .map((c) => {
              const label = c.title || c.url || c.source_type || "citation";
              const href = c.url && c.url.startsWith("http") ? c.url : "";
              if (href) {
                return `<a class="cite-chip" href="${escapeHtml(href)}" target="_blank" rel="noreferrer">${escapeHtml(label)}</a>`;
              }
              return `<span class="cite-chip">${escapeHtml(label)}</span>`;
            })
            .join("");

          const meta = [
            `<span>${msg.role === "user" ? "你" : "Hachi"}</span>`,
            msg.time ? `<span>${escapeHtml(msg.time)}</span>` : "",
            citeHtml,
          ].filter(Boolean).join("");
          return `<div class="msg ${msg.role}">${escapeHtml(msg.content).replaceAll("\n", "<br>")}<div class="msg-meta">${meta}</div></div>`;
        })
        .join("");

      thread.scrollTop = thread.scrollHeight;
    }

    function renderToolTrace(trace = []) {
      const holder = $("toolTraceList");
      if (!trace.length) {
        holder.innerHTML = '<div class="empty">暂无工具轨迹。</div>';
        return;
      }

      holder.innerHTML = trace
        .map((item) => {
          const status = String(item.status || "unknown");
          const statusClass = status === "ok" ? "trace-ok" : status === "skipped" ? "trace-skip" : "";
          const detailPairs = Object.entries(item)
            .filter(([k]) => k !== "tool" && k !== "status")
            .slice(0, 4)
            .map(([k, v]) => `${k}: ${typeof v === "object" ? JSON.stringify(v) : String(v)}`)
            .join(" · ");

          return `
            <div class="trace-item">
              <b>${escapeHtml(String(item.tool || "tool"))}</b>
              <span class="trace-tag ${statusClass}">${escapeHtml(status)}</span>
              ${detailPairs ? `<div class="muted" style="margin-top:4px;">${escapeHtml(detailPairs)}</div>` : ""}
            </div>
          `;
        })
        .join("");
    }

    function renderCitations(citations = []) {
      const holder = $("citationList");
      if (!citations.length) {
        holder.innerHTML = '<div class="empty">暂无引用。</div>';
        return;
      }

      holder.innerHTML = citations
        .map((c) => {
          const urlHtml = c.url ? `<a class="cite-chip" href="${escapeHtml(c.url)}" target="_blank" rel="noreferrer">打开链接</a>` : "";
          return `
            <div class="citation-item">
              <b>${escapeHtml(c.title || "未命名引用")}</b>
              <div class="muted" style="margin:4px 0;">${escapeHtml(c.source_type || "local")}</div>
              <div>${escapeHtml(c.snippet || "").slice(0, 180)}</div>
              <div style="margin-top:6px;">${urlHtml}</div>
            </div>
          `;
        })
        .join("");
    }

    function renderMemory(summary) {
      const holder = $("memoryList");
      if (!summary || !summary.has_summary) {
        holder.innerHTML = '<div class="empty">当前会话暂无压缩记忆。</div>';
        return;
      }

      const blocks = [];
      for (const [label, items] of [
        ["facts", summary.facts || []],
        ["open_questions", summary.open_questions || []],
        ["decisions", summary.decisions || []],
      ]) {
        if (!items.length) continue;
        blocks.push(`
          <div class="memory-item">
            <b>${escapeHtml(label)}</b>
            <div style="margin-top:4px;">${items.map((x) => `• ${escapeHtml(String(x))}`).join("<br>")}</div>
          </div>
        `);
      }

      if (!blocks.length) {
        blocks.push(`<div class="memory-item">${escapeHtml(summary.raw_summary || "有摘要但为空")}</div>`);
      }

      holder.innerHTML = blocks.join("");
    }

    function renderReminders(reminders = []) {
      const holder = $("reminderList");
      if (!Array.isArray(reminders) || !reminders.length) {
        holder.innerHTML = '<div class="empty">暂无待提醒事项。</div>';
        return;
      }

      holder.innerHTML = reminders
        .map((item) => {
          const remindAt = item.remind_at ? new Date(item.remind_at).toLocaleString() : "-";
          const calendarState = item.calendar_event_id
            ? " · 已同步日历"
            : item.calendar_error
              ? " · 日历同步失败"
              : "";
          return `
            <div class="reminder-item">
              <b>${escapeHtml(item.title || "邮件提醒")}</b>
              <div class="muted" style="margin:4px 0;">${escapeHtml(remindAt)} · ${escapeHtml(item.status || "pending")}${escapeHtml(calendarState)}</div>
              <div>${escapeHtml(item.body || "").slice(0, 180)}</div>
            </div>
          `;
        })
        .join("");
    }

    function pushMessage(role, content, citations = []) {
      state.messages.push({
        role,
        content,
        citations,
        time: new Date().toLocaleTimeString(),
      });
      renderChat();
    }

    function getSkillInputText(skillId = "") {
      if (skillId === "email_reminder") {
        const draft = $("questionInput").value.trim();
        if (draft) return draft;
      }

      if (state.lastResponse && state.lastResponse.answer) {
        return String(state.lastResponse.answer).trim();
      }

      const lastAssistant = [...state.messages].reverse().find((msg) => msg.role === "assistant" && msg.content);
      if (lastAssistant) {
        return String(lastAssistant.content).trim();
      }

      return $("questionInput").value.trim();
    }

    function persistSkillResult(data, inputText) {
      const key = `hachi-skill-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      const payload = {
        ...data,
        input_text: inputText,
        created_at: new Date().toISOString(),
      };
      localStorage.setItem(key, JSON.stringify(payload));

      const keys = Object.keys(localStorage)
        .filter((itemKey) => itemKey.startsWith("hachi-skill-"))
        .sort();
      keys.slice(0, Math.max(0, keys.length - 20)).forEach((itemKey) => localStorage.removeItem(itemKey));
      return key;
    }

    function renderSkillResultLink(data, resultUrl, opened) {
      const preview = String(data.result || "").trim().slice(0, 260) || "Skill 已完成，打开新页面查看结果。";
      const openedText = opened ? "已打开新页面" : "浏览器可能拦截了自动打开，请点击进入";
      return `
        <div class="skill-artifact">
          <a id="skillResultLink" href="${escapeHtml(resultUrl)}" target="_blank" rel="noreferrer">打开结果页</a>
          <span class="muted">${escapeHtml(openedText)}</span>
        </div>
        <a class="skill-preview" href="${escapeHtml(resultUrl)}" target="_blank" rel="noreferrer">
          <strong>${escapeHtml(data.title || "Skill 结果")}</strong>
          <div>${escapeHtml(preview)}</div>
        </a>
      `;
    }

    async function runSkill(skillId, button, customInstruction = "") {
      const inputText = getSkillInputText(skillId);
      if (!inputText) {
        setStatus("没有可处理的内容", "err");
        return;
      }

      const metadata = {};
      if (skillId === "email_reminder") {
        const reminderAt = $("reminderAtInput").value;
        if (!reminderAt) {
          setStatus("请先选择邮件提醒时间", "err");
          return;
        }
        metadata.reminder_at = new Date(reminderAt).toISOString();
        metadata.macos_calendar = $("syncMacCalendar").checked;
      }

      const done = withLoading(button, "运行中...");
      try {
        setStatus("正在运行 Skill...");
        const payload = {
          skill_id: skillId,
          input_text: inputText,
          metadata,
        };
        if (skillId === "custom") {
          payload.title = "自定义 Skill";
          payload.custom_instruction = customInstruction;
        }

        const data = await requestJson("/api/skills/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        state.lastSkillOutput = data;
        const resultKey = persistSkillResult(data, inputText);
        const resultUrl = `/tools/skill-result?key=${encodeURIComponent(resultKey)}`;
        const opened = window.open(resultUrl, "_blank");
        if (opened) opened.opener = null;
        $("skillResult").innerHTML = renderSkillResultLink(data, resultUrl, Boolean(opened));
        $("rawOutput").textContent = JSON.stringify(data, null, 2);
        if (skillId === "email_reminder") {
          await refreshReminders();
        }
        setStatus(opened ? "Skill 完成，已打开结果页" : "Skill 完成，请点击打开结果页", "ok");
      } catch (error) {
        setStatus(String(error.message || error), "err");
      } finally {
        done();
      }
    }

    async function deleteKnowledge(docId, askConfirm = true) {
      const item = state.sources.find((source) => String(source.id) === String(docId));
      const label = item ? item.title || docId : docId;
      if (askConfirm && !window.confirm(`确认删除知识来源“${label}”？`)) return;

      setStatus("正在删除知识...");
      const data = await requestJson(`/api/knowledge/${encodeURIComponent(docId)}`, {
        method: "DELETE",
      });
      $("rawOutput").textContent = JSON.stringify(data, null, 2);
      await refreshSources();
      setStatus(`已删除: ${data.title || docId}`, "ok");
    }

    async function refreshSources() {
      const data = await requestJson("/api/knowledge/recent?limit=120");
      state.sources = Array.isArray(data) ? data : [];
      renderSources();
    }

    async function refreshReminders() {
      const data = await requestJson("/api/reminders?status=pending&limit=30");
      renderReminders(Array.isArray(data) ? data : []);
    }

    async function fetchMemory() {
      const sid = state.sessionId || $("sessionIdInput").value.trim();
      if (!sid) {
        renderMemory(null);
        setStatus("无会话可读记忆");
        return;
      }
      const summary = await requestJson(`/api/sessions/${encodeURIComponent(sid)}/memory`);
      renderMemory(summary);
      setStatus("记忆已刷新", "ok");
    }

    async function onIngestText() {
      const btn = $("ingestTextBtn");
      const done = withLoading(btn, "导入中...");
      try {
        const title = $("textTitle").value.trim();
        const content = $("textContent").value.trim();
        if (!title || !content) throw new Error("请填写文本标题和内容");

        const data = await requestJson("/api/knowledge/text", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, content }),
        });

        setStatus(`文本已入库: ${data.title}`, "ok");
        $("rawOutput").textContent = JSON.stringify(data, null, 2);
        await refreshSources();
      } catch (error) {
        setStatus(String(error.message || error), "err");
      } finally {
        done();
      }
    }

    async function onIngestUrl() {
      const btn = $("ingestUrlBtn");
      const done = withLoading(btn, "抓取中...");
      try {
        const url = $("urlInput").value.trim();
        const title = $("urlTitle").value.trim();
        if (!url) throw new Error("请填写 URL");

        const payload = { url, title: title || null };
        const data = await requestJson("/api/knowledge/url", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        setStatus(`网页已入库: ${data.title}`, "ok");
        $("rawOutput").textContent = JSON.stringify(data, null, 2);
        await refreshSources();
      } catch (error) {
        setStatus(String(error.message || error), "err");
      } finally {
        done();
      }
    }

    async function onIngestPdf() {
      const btn = $("ingestPdfBtn");
      const done = withLoading(btn, "上传中...");
      try {
        const file = $("pdfFile").files && $("pdfFile").files[0];
        if (!file) throw new Error("请先选择 PDF 文件");

        const title = $("pdfTitle").value.trim();
        const form = new FormData();
        form.append("file", file);
        if (title) form.append("title", title);

        const response = await fetch("/api/knowledge/upload", {
          method: "POST",
          body: form,
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(String(data.detail || `HTTP ${response.status}`));
        }

        setStatus(`PDF 已入库: ${data.title}`, "ok");
        $("rawOutput").textContent = JSON.stringify(data, null, 2);
        await refreshSources();
      } catch (error) {
        setStatus(String(error.message || error), "err");
      } finally {
        done();
      }
    }

    async function onAsk() {
      const btn = $("askBtn");
      const done = withLoading(btn, "思考中...");
      try {
        const questionInput = $("questionInput");
        const question = questionInput.value.trim();
        if (!question) throw new Error("请输入问题");

        pushMessage("user", question);
        questionInput.value = "";

        const sidInput = $("sessionIdInput").value.trim();
        const data = await requestJson("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: sidInput || state.sessionId || null,
            question,
            allow_web: $("allowWeb").checked,
            allow_memory_compress: $("allowMem").checked,
            model_mode: "agentic",
          }),
        });

        state.sessionId = data.session_id;
        $("sessionIdInput").value = data.session_id;
        $("sessionLabel").textContent = `会话：${data.session_id}`;

        pushMessage("assistant", data.answer || "(无回答)", data.citations || []);
        renderToolTrace(data.tool_trace || []);
        renderCitations(data.citations || []);
        $("rawOutput").textContent = JSON.stringify(data, null, 2);

        state.lastResponse = data;
        setStatus("回答完成", "ok");

        await fetchMemory().catch(() => null);
      } catch (error) {
        pushMessage("assistant", `请求失败：${error.message || error}`);
        setStatus(String(error.message || error), "err");
      } finally {
        done();
      }
    }

    async function onRebuildMemory() {
      const sid = state.sessionId || $("sessionIdInput").value.trim();
      if (!sid) {
        setStatus("请先发起至少一次提问以创建会话", "err");
        return;
      }
      setStatus("正在重整记忆...");
      try {
        const data = await requestJson(`/api/sessions/${encodeURIComponent(sid)}/memory/rebuild`, {
          method: "POST",
        });
        $("rawOutput").textContent = JSON.stringify(data, null, 2);
        await fetchMemory();
      } catch (error) {
        setStatus(String(error.message || error), "err");
      }
    }

    function bindTabs() {
      const tabs = Array.from(document.querySelectorAll(".tab"));
      const panes = Array.from(document.querySelectorAll(".ingest-pane"));
      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          const mode = tab.dataset.mode;
          tabs.forEach((x) => x.classList.toggle("active", x === tab));
          panes.forEach((pane) => pane.classList.toggle("active", pane.dataset.pane === mode));
        });
      });
    }

    function bindEvents() {
      $("ingestTextBtn").addEventListener("click", onIngestText);
      $("ingestUrlBtn").addEventListener("click", onIngestUrl);
      $("ingestPdfBtn").addEventListener("click", onIngestPdf);
      $("askBtn").addEventListener("click", onAsk);
      document.querySelectorAll("[data-skill-id]").forEach((button) => {
        button.addEventListener("click", () => {
          runSkill(button.dataset.skillId, button).catch((error) => setStatus(String(error.message || error), "err"));
        });
      });
      $("runCustomSkillBtn").addEventListener("click", () => {
        const instruction = $("customSkillInput").value.trim();
        if (!instruction) {
          setStatus("请先填写自定义 Skill", "err");
          return;
        }
        runSkill("custom", $("runCustomSkillBtn"), instruction).catch((error) =>
          setStatus(String(error.message || error), "err")
        );
      });
      $("refreshMemoryBtn").addEventListener("click", () => {
        fetchMemory().catch((error) => setStatus(String(error.message || error), "err"));
      });
      $("rebuildMemoryBtn").addEventListener("click", onRebuildMemory);
      $("refreshRemindersBtn").addEventListener("click", () => {
        refreshReminders()
          .then(() => setStatus("提醒已刷新", "ok"))
          .catch((error) => setStatus(String(error.message || error), "err"));
      });
      $("sourceList").addEventListener("click", (event) => {
        const button = event.target.closest("[data-delete-doc-id]");
        if (!button) return;
        deleteKnowledge(button.dataset.deleteDocId).catch((error) => setStatus(String(error.message || error), "err"));
      });

      $("sourceFilter").addEventListener("input", (event) => {
        state.sourceFilter = String(event.target.value || "");
        renderSources();
      });

      $("questionInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          onAsk();
        }
      });
    }

    async function bootstrap() {
      bindTabs();
      bindEvents();
      renderChat();
      renderSources();
      renderToolTrace();
      renderCitations();
      renderMemory(null);
      renderReminders();
      setStatus("初始化中...");

      try {
        await refreshSources();
        await refreshReminders();
        setStatus("就绪", "ok");
      } catch (error) {
        setStatus(`来源加载失败: ${error.message || error}`, "err");
      }
    }

    bootstrap();
  </script>
</body>
</html>
